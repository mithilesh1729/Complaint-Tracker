services:
  db:
    image: postgres:17
    container_name: complaint-db

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: complaint-redis

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .

    container_name: complaint-backend

    command: python manage.py runserver 0.0.0.0:8000 --settings=complaint_tracker.settings.dev

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    environment:
      DJANGO_SETTINGS_MODULE: complaint_tracker.settings.dev

      DB_NAME: complaint_db
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db 
      DB_PORT: 5432

      REDIS_HOST: redis
      REDIS_PORT: 6379

    depends_on:
      - db
      - redis

  celery_worker:
    build: .
    container_name: complaint-celery
    command: celery -A complaint_tracker worker -l info
    volumes:
      - .:/app
    environment:
      DJANGO_SETTINGS_MODULE: complaint_tracker.settings.dev
      DB_NAME: complaint_db
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db 
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - db
      - redis
      - backend

volumes:
  postgres_data:
