services:
  db:
    image: postgres:17
    container_name: complaint-db

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

  backend:
    build: .

    container_name: complaint-backend

    command: python manage.py runserver 0.0.0.0:8000 --settings=complaint_tracker.settings.dev

    ports:
      - "8000:8000"

    environment:
      DJANGO_SETTINGS_MODULE: complaint_tracker.settings.dev

      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: ${DB_PORT}

      SECRET_KEY: ${SECRET_KEY}

    depends_on:
      - db

volumes:
  postgres_data: